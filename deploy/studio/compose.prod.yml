name: elevenlabs-studio
services:
  studio-web:
    build:
      context: ../../apps/studio
      args:
        VITE_APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL is required}
    image: elevenlabs-studio-web:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:8181:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
