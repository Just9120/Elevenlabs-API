name: elevenlabs-studio-platform
services:
  studio-web:
    build:
      context: ../../apps/studio
      args:
        VITE_APP_PUBLIC_URL: "${APP_PUBLIC_URL:?APP_PUBLIC_URL is required}"
        VITE_STUDIO_PLATFORM_MODE: platform
    image: elevenlabs-studio-web:local
    restart: unless-stopped
    ports: ["127.0.0.1:8181:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q ok"]
      interval: 30s
      timeout: 3s
      retries: 3
  studio-api:
    build: ../../apps/studio-api
    image: elevenlabs-studio-api:local
    restart: unless-stopped
    ports: ["127.0.0.1:8182:8000"]
    environment:
      STUDIO_DATABASE_SCHEME: postgresql+psycopg
      STUDIO_DATABASE_HOST: postgres
      STUDIO_DATABASE_PORT: "5432"
      STUDIO_DATABASE_NAME: studio
      STUDIO_DATABASE_USER: studio
      STUDIO_POSTGRES_PASSWORD_FILE: /run/secrets/studio_postgres_password
      STUDIO_REDIS_URL: redis://redis:6379/0
      STUDIO_APP_ORIGIN: ${APP_PUBLIC_URL:?APP_PUBLIC_URL is required}
      STUDIO_CREDENTIAL_MASTER_KEY_FILE: /run/secrets/studio_credential_master_key
      STUDIO_SOURCE_S3_ENDPOINT_URL: ${STUDIO_SOURCE_S3_ENDPOINT_URL:?STUDIO_SOURCE_S3_ENDPOINT_URL is required}
      STUDIO_SOURCE_S3_REGION: ${STUDIO_SOURCE_S3_REGION:?STUDIO_SOURCE_S3_REGION is required}
      STUDIO_SOURCE_S3_BUCKET: ${STUDIO_SOURCE_S3_BUCKET:?STUDIO_SOURCE_S3_BUCKET is required}
      STUDIO_SOURCE_S3_ACCESS_KEY_ID_FILE: /run/secrets/studio_source_s3_access_key_id
      STUDIO_SOURCE_S3_SECRET_ACCESS_KEY_FILE: /run/secrets/studio_source_s3_secret_access_key
      STUDIO_SOURCE_UPLOAD_TTL_SECONDS: ${STUDIO_SOURCE_UPLOAD_TTL_SECONDS:?STUDIO_SOURCE_UPLOAD_TTL_SECONDS is required}
      STUDIO_SOURCE_PRESIGN_TTL_SECONDS: ${STUDIO_SOURCE_PRESIGN_TTL_SECONDS:?STUDIO_SOURCE_PRESIGN_TTL_SECONDS is required}
      STUDIO_SOURCE_MAX_UPLOAD_BYTES: ${STUDIO_SOURCE_MAX_UPLOAD_BYTES:?STUDIO_SOURCE_MAX_UPLOAD_BYTES is required}
      STUDIO_GOOGLE_OAUTH_CLIENT_ID: ${STUDIO_GOOGLE_OAUTH_CLIENT_ID:-}
      STUDIO_GOOGLE_OAUTH_CLIENT_SECRET_FILE: /run/secrets/studio_google_oauth_client_secret
      STUDIO_GOOGLE_OAUTH_REDIRECT_URI: ${STUDIO_GOOGLE_OAUTH_REDIRECT_URI:-}
      STUDIO_GOOGLE_OAUTH_SCOPES: ${STUDIO_GOOGLE_OAUTH_SCOPES:-openid email https://www.googleapis.com/auth/drive.file}
      STUDIO_GOOGLE_OAUTH_STATE_TTL_SECONDS: ${STUDIO_GOOGLE_OAUTH_STATE_TTL_SECONDS:-600}
    secrets:
      - studio_credential_master_key
      - studio_postgres_password
      - studio_source_s3_access_key_id
      - studio_source_s3_secret_access_key
      - studio_google_oauth_client_secret
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request,sys\nsys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/healthz', timeout=2).status==200 else 1)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: studio
      POSTGRES_USER: studio
      POSTGRES_PASSWORD_FILE: /run/secrets/studio_postgres_password
    secrets: [studio_postgres_password]
    volumes: [studio-postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d studio"]
      interval: 30s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
secrets:
  studio_postgres_password:
    file: ${STUDIO_POSTGRES_PASSWORD_FILE:?secret file required}
  studio_credential_master_key:
    file: ${STUDIO_CREDENTIAL_MASTER_KEY_FILE:?secret file required}
  studio_source_s3_access_key_id:
    file: ${STUDIO_SOURCE_S3_ACCESS_KEY_ID_FILE:?source S3 access key id secret file required}
  studio_source_s3_secret_access_key:
    file: ${STUDIO_SOURCE_S3_SECRET_ACCESS_KEY_FILE:?source S3 secret access key secret file required}
  studio_google_oauth_client_secret:
    file: ${STUDIO_GOOGLE_OAUTH_CLIENT_SECRET_FILE:-./optional-empty-secret}
volumes:
  studio-postgres-data:
