name: Studio PWA CI

on:
  pull_request:
    paths:
      - 'apps/studio/**'
      - 'apps/studio-api/**'
      - 'deploy/studio/**'
      - '.github/workflows/studio-ci.yml'
      - '.github/workflows/studio-cd.yml'
      - 'scripts/deploy_studio.sh'
      - 'scripts/deploy_studio_platform.sh'
      - 'scripts/migrate_studio_platform.sh'
      - 'docs/runbooks/studio-deploy.md'
  push:
    branches: [main]
    paths:
      - 'apps/studio/**'
      - 'apps/studio-api/**'
      - 'deploy/studio/**'
      - '.github/workflows/studio-ci.yml'
      - '.github/workflows/studio-cd.yml'
      - 'scripts/deploy_studio.sh'
      - 'scripts/deploy_studio_platform.sh'
      - 'scripts/migrate_studio_platform.sh'
      - 'docs/runbooks/studio-deploy.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json
      - run: npm ci
        working-directory: apps/studio
      - run: npm run lint
        working-directory: apps/studio
      - run: npm run test -- --run
        working-directory: apps/studio
      - run: npm run build
        working-directory: apps/studio
      - run: docker build -t elevenlabs-studio-web:test apps/studio

      - name: Validate platform compose config
        run: |
          tmp=$(mktemp -d)
          printf 'not-a-secret-ci-password' > "$tmp/postgres_password"
          python - <<'PY2' > "$tmp/master_key"
import base64
print(base64.b64encode(b'3'*32).decode())
PY2
          cp deploy/studio/.env.example "$tmp/.env"
          cat >> "$tmp/.env" <<EOF
STUDIO_POSTGRES_PASSWORD_FILE=$tmp/postgres_password
STUDIO_CREDENTIAL_MASTER_KEY_FILE=$tmp/master_key
EOF
          docker compose --env-file "$tmp/.env" -f deploy/studio/compose.platform.yml config >/dev/null
      - run: docker build -t elevenlabs-studio-api:test apps/studio-api
      - run: echo "STUDIO_CI_OK"
