name: Studio Processing Preflight

on:
  workflow_dispatch:
    inputs:
      expected_commit:
        description: 'Expected production HEAD commit (40-character SHA)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: studio-platform-production
  cancel-in-progress: false

jobs:
  host-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate dispatch inputs and branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Studio Processing Preflight must be dispatched from main" >&2
            exit 1
          fi
          if [[ ! "${{ inputs.expected_commit }}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "expected_commit must be exactly one 40-character hexadecimal commit SHA" >&2
            exit 1
          fi

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS; do
            if [[ -z "${!name}" ]]; then
              echo "required deployment secret is missing: $name" >&2
              exit 1
            fi
          done

      - name: Checkout trusted source
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run read-only Studio processing host preflight
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          remote_script="$(ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" 'mktemp /tmp/studio-processing-preflight.XXXXXX')"
          cleanup() {
            ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" "rm -f '$remote_script'" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes scripts/studio_processing_preflight.sh "$DEPLOY_USER@$DEPLOY_HOST:$remote_script"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "chmod 700 '$remote_script' && cd /opt/elevenlabs-studio && '$remote_script' /opt/elevenlabs-studio main Just9120/Elevenlabs-API '$EXPECTED_COMMIT'"
