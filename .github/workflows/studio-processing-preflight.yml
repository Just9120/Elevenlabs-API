name: Studio Processing Preflight

on:
  workflow_dispatch:
    inputs:
      expected_commit:
        description: 'Expected production HEAD commit (40-character SHA)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: studio-platform-production
  cancel-in-progress: false

jobs:
  host-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate dispatch inputs and branch
        shell: bash
        env:
          DISPATCH_REF: ${{ github.ref }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          if [[ "$DISPATCH_REF" != "refs/heads/main" ]]; then
            echo "Studio Processing Preflight must be dispatched from main" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_COMMIT" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "expected_commit must be exactly one 40-character hexadecimal commit SHA" >&2
            exit 1
          fi

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS; do
            if [[ -z "${!name}" ]]; then
              echo "required deployment secret is missing: $name" >&2
              exit 1
            fi
          done

      - name: Checkout trusted source
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run read-only Studio processing host preflight
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          mktemp_output="$(ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" 'mktemp /tmp/studio-processing-preflight.XXXXXX')"
          mapfile -t mktemp_lines <<<"$mktemp_output"
          if [[ "${#mktemp_lines[@]}" -ne 1 || -z "${mktemp_lines[0]}" ]]; then
            echo "remote temporary script path was not exactly one non-empty line" >&2
            exit 1
          fi
          remote_script="${mktemp_lines[0]}"
          if [[ ! "$remote_script" =~ ^/tmp/studio-processing-preflight\.[A-Za-z0-9]{6,32}$ ]]; then
            echo "remote temporary script path did not match the expected safe pattern" >&2
            exit 1
          fi
          shell_quote() { printf '%q' "$1"; }
          cleanup() {
            cleanup_command="rm -f -- $(shell_quote "$remote_script")"
            ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" "$cleanup_command" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes scripts/studio_processing_preflight.sh "$DEPLOY_USER@$DEPLOY_HOST:$remote_script"
          execute_command="chmod 700 -- $(shell_quote "$remote_script") && cd $(shell_quote /opt/elevenlabs-studio) && $(shell_quote "$remote_script") $(shell_quote /opt/elevenlabs-studio) $(shell_quote main) $(shell_quote Just9120/Elevenlabs-API) $(shell_quote "$EXPECTED_COMMIT")"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" "$execute_command"
