name: Dependency audit

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json
      - name: Install Studio frontend dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
        working-directory: apps/studio
      - name: Audit Studio frontend dependency graph
        run: npm audit --audit-level=low
        working-directory: apps/studio
      - name: Mark Node audit success
        run: echo "NODE_DEPENDENCY_AUDIT_OK"

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            constraints-dev.txt
            apps/studio-api/requirements.txt
            apps/studio-api/constraints.txt
      - name: Install audit tool and constrained dependency graph
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.1
          python -m pip install --target "$RUNNER_TEMP/studio-python-audit" -r requirements-dev.txt -c constraints-dev.txt
      - name: Audit installed Python dependency graph
        run: python -m pip_audit --strict --path "$RUNNER_TEMP/studio-python-audit"
      - name: Mark Python audit success
        run: echo "PYTHON_DEPENDENCY_AUDIT_OK"
